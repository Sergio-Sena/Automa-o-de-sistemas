<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login</title>
    <style>
        @import url(https://fonts.googleapis.com/css?family=Open+Sans);
        
        .btn { 
            display: inline-block; 
            padding: 4px 10px 4px; 
            margin-bottom: 0; 
            font-size: 13px; 
            line-height: 18px; 
            color: #333333; 
            text-align: center;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.75); 
            vertical-align: middle; 
            background-color: #f5f5f5; 
            background-image: linear-gradient(top, #ffffff, #e6e6e6); 
            border: 1px solid #e6e6e6; 
            border-radius: 4px; 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05); 
            cursor: pointer; 
        }
        
        .btn:hover, .btn:active, .btn.active, .btn.disabled, .btn[disabled] { 
            background-color: #e6e6e6; 
        }
        
        .btn-large { 
            padding: 9px 14px; 
            font-size: 15px; 
            line-height: normal; 
            border-radius: 5px; 
        }
        
        .btn:hover { 
            color: #333333; 
            text-decoration: none; 
            background-color: #e6e6e6; 
            background-position: 0 -15px; 
            transition: background-position 0.1s linear; 
        }
        
        .btn-primary, .btn-primary:hover { 
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25); 
            color: #ffffff; 
        }
        
        .btn-primary.active { 
            color: rgba(255, 255, 255, 0.75); 
        }
        
        .btn-primary { 
            background-color: #4a77d4; 
            background-image: linear-gradient(top, #6eb6de, #4a77d4); 
            border: 1px solid #3762bc; 
            text-shadow: 1px 1px 1px rgba(0,0,0,0.4); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.5); 
        }
        
        .btn-primary:hover, .btn-primary:active, .btn-primary.active, .btn-primary.disabled, .btn-primary[disabled] { 
            background-color: #4a77d4; 
        }
        
        .btn-block { 
            width: 100%; 
            display: block; 
        }

        .btn-secondary, .btn-secondary:hover {
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
            color: #ffffff;
        }
        
        .btn-secondary.active {
            color: rgba(255, 255, 255, 0.75);
        }
        
        .btn-secondary {
            background-color: #6c757d;
            background-image: linear-gradient(top, #868e96, #6c757d);
            border: 1px solid #5a6268;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.4);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.5);
            margin-top: 10px;
        }
        
        .btn-secondary:hover, .btn-secondary:active, .btn-secondary.active, .btn-secondary.disabled, .btn-secondary[disabled] {
            background-color: #5a6268;
        }

        * { 
            box-sizing: border-box; 
        }

        html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }

        body { 
            width: 100%;
            height: 100%;
            font-family: 'Open Sans', sans-serif;
            background: #092756;
            background: radial-gradient(ellipse at 0% 100%, rgba(104,128,138,.4) 10%, rgba(138,114,76,0) 40%), 
                        linear-gradient(to bottom, rgba(57,173,219,.25) 0%, rgba(42,60,87,.4) 100%), 
                        linear-gradient(135deg, #670d10 0%, #092756 100%);
            margin: 0;
            padding: 0;
        }
        
        .login { 
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -150px 0 0 -150px;
            width: 300px;
            height: 300px;
        }
        
        .login h1 { 
            color: #fff; 
            text-shadow: 0 0 10px rgba(0,0,0,0.3); 
            letter-spacing: 1px; 
            text-align: center; 
            margin-bottom: 30px;
        }

        input { 
            width: 100%; 
            margin-bottom: 10px; 
            background: rgba(0,0,0,0.3);
            border: none;
            outline: none;
            padding: 10px;
            font-size: 13px;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.3);
            border-radius: 4px;
            box-shadow: inset 0 -5px 45px rgba(100,100,100,0.2), 0 1px 1px rgba(255,255,255,0.2);
            transition: box-shadow .5s ease;
        }
        
        input:focus { 
            box-shadow: inset 0 -5px 45px rgba(100,100,100,0.4), 0 1px 1px rgba(255,255,255,0.2); 
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <div class="login">
        <h1>Login</h1>
        <form method="post" onsubmit="return fazerLogin(event)">
            <input type="text" name="u" id="username" placeholder="Username" required="required" />
            <input type="password" name="p" id="password" placeholder="Password" required="required" />
            <button type="submit" class="btn btn-primary btn-block btn-large">Let me in.</button>
        </form>
        <button onclick="window.location.href='cadastro.html'" class="btn btn-secondary btn-block btn-large">Cadastrar Usuário</button>
    </div>

    <script>
        // Dados de usuários (simulando backend)
        const usuarios = {
            "admin": "123",
            "sergio sena": "123"
        };

        function fazerLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Verificar usuários do localStorage também
            const usuariosCadastrados = JSON.parse(localStorage.getItem('usuarios')) || {};
            const todosUsuarios = {...usuarios, ...usuariosCadastrados};
            
            if (todosUsuarios[username] && todosUsuarios[username] === password) {
                localStorage.setItem('usuarioLogado', username);
                alert(`Bem-vindo, ${username}!`);
                window.location.href = 'cadastro.html';
            } else {
                alert('Usuário ou senha incorretos!');
            }
            
            return false;
        }
    </script>
</body>
</html>
