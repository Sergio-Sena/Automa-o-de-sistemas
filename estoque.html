<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>
    <style>
        @import url(https://fonts.googleapis.com/css?family=Open+Sans);
        
        * { 
            box-sizing: border-box; 
        }

        html { 
            width: 100%; 
            height: 100%; 
        }

        body { 
            width: 100%;
            height: 100%;
            font-family: 'Open Sans', sans-serif;
            background: #092756;
            background: radial-gradient(ellipse at 0% 100%, rgba(104,128,138,.4) 10%, rgba(138,114,76,0) 40%), 
                        linear-gradient(to bottom, rgba(57,173,219,.25) 0%, rgba(42,60,87,.4) 100%), 
                        linear-gradient(135deg, #670d10 0%, #092756 100%);
            margin: 0;
            padding: 20px;
        }
        
        .container { 
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        
        h1 { 
            color: #fff; 
            text-shadow: 0 0 10px rgba(0,0,0,0.3); 
            letter-spacing: 1px; 
            text-align: center; 
            margin-bottom: 30px;
        }

        .section {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
        }

        input, select { 
            width: 100%; 
            margin-bottom: 15px; 
            background: rgba(0,0,0,0.3);
            border: none;
            outline: none;
            padding: 12px;
            font-size: 14px;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.3);
            border-radius: 4px;
            box-shadow: inset 0 -5px 45px rgba(100,100,100,0.2), 0 1px 1px rgba(255,255,255,0.2);
            transition: box-shadow .5s ease;
        }
        
        input:focus, select:focus { 
            box-shadow: inset 0 -5px 45px rgba(100,100,100,0.4), 0 1px 1px rgba(255,255,255,0.2); 
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        select option {
            background: #333;
            color: #fff;
        }

        .btn { 
            display: inline-block; 
            padding: 12px 20px; 
            margin: 5px; 
            font-size: 14px; 
            font-weight: bold;
            color: #ffffff; 
            text-align: center;
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
            border: none;
            border-radius: 5px; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        
        .btn-primary { 
            background: linear-gradient(to bottom, #6eb6de, #4a77d4); 
            border: 1px solid #3762bc; 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.5); 
        }

        .btn-success { 
            background: linear-gradient(to bottom, #62c462, #51a351); 
            border: 1px solid #45a049; 
        }

        .btn-warning { 
            background: linear-gradient(to bottom, #fbb450, #f89406); 
            border: 1px solid #e67e22; 
        }

        .btn-danger { 
            background: linear-gradient(to bottom, #ee5f5b, #bd362f); 
            border: 1px solid #c0392b; 
        }
        
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .btn-block { 
            width: 100%; 
            display: block; 
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row input, .form-row select {
            flex: 1;
        }

        .user-info {
            text-align: right;
            color: #6eb6de;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .estoque-list {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .estoque-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            color: white;
            border-left: 4px solid #6eb6de;
        }

        .estoque-item.baixo {
            border-left-color: #f89406;
        }

        .estoque-item.critico {
            border-left-color: #bd362f;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #6eb6de;
        }

        .card .number {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Controle de Estoque</h1>
        
        <!-- Dashboard -->
        <div class="dashboard">
            <div class="card">
                <h3>Total Produtos</h3>
                <div class="number" id="total-produtos">0</div>
            </div>
            <div class="card">
                <h3>Estoque Baixo</h3>
                <div class="number" id="estoque-baixo">0</div>
            </div>
            <div class="card">
                <h3>Valor Total</h3>
                <div class="number" id="valor-total">R$ 0,00</div>
            </div>
            <div class="card">
                <h3>Produtos Críticos</h3>
                <div class="number" id="produtos-criticos">0</div>
            </div>
        </div>

        <!-- Seção de Produtos -->
        <div class="section" id="estoque-section">
            <div class="user-info" id="user-info">Logado como: Admin</div>
            <h2>Cadastro de Produtos no Estoque</h2>
            <form onsubmit="return cadastrarProduto(event)">
                <div class="form-row">
                    <input type="text" id="produto-codigo" placeholder="Código (ex: EST001)" required />
                    <input type="text" id="produto-nome" placeholder="Nome do produto" required />
                </div>
                <div class="form-row">
                    <select id="produto-categoria" required>
                        <option value="">Selecione a categoria</option>
                        <option value="Eletronicos">Eletrônicos</option>
                        <option value="Roupas">Roupas</option>
                        <option value="Casa">Casa</option>
                        <option value="Saude">Saúde</option>
                        <option value="Esportes">Esportes</option>
                    </select>
                    <input type="text" id="produto-fornecedor" placeholder="Fornecedor" required />
                </div>
                <div class="form-row">
                    <input type="number" id="produto-estoque-atual" placeholder="Estoque Atual" required />
                    <input type="number" id="produto-estoque-minimo" placeholder="Estoque Mínimo" required />
                </div>
                <div class="form-row">
                    <input type="number" id="produto-preco-custo" step="0.01" placeholder="Preço Custo (R$)" required />
                    <input type="number" id="produto-preco-venda" step="0.01" placeholder="Preço Venda (R$)" required />
                </div>
                <div class="form-row">
                    <input type="text" id="produto-localizacao" placeholder="Localização (ex: A1-P2)" required />
                    <input type="text" id="produto-validade" placeholder="Validade (dd/mm/aaaa)" />
                </div>
                <button type="submit" class="btn btn-success btn-block btn-large">Cadastrar no Estoque</button>
            </form>
            
            <button class="btn btn-danger" onclick="logout()">Logout</button>
            
            <h3 style="color: white; margin-top: 30px;">Produtos em Estoque:</h3>
            <div class="estoque-list" id="estoque-list"></div>
        </div>
    </div>

    <script>
        let produtos = JSON.parse(localStorage.getItem('estoque_produtos')) || [];

        function salvarDados() {
            localStorage.setItem('estoque_produtos', JSON.stringify(produtos));
            atualizarDashboard();
            atualizarListaEstoque();
        }

        window.onload = function() {
            atualizarDashboard();
            atualizarListaEstoque();
        };

        function cadastrarProduto(event) {
            event.preventDefault();
            
            const codigo = document.getElementById('produto-codigo').value.trim();
            const nome = document.getElementById('produto-nome').value.trim();
            const categoria = document.getElementById('produto-categoria').value;
            const fornecedor = document.getElementById('produto-fornecedor').value.trim();
            const estoqueAtual = parseInt(document.getElementById('produto-estoque-atual').value);
            const estoqueMinimo = parseInt(document.getElementById('produto-estoque-minimo').value);
            const precoCusto = parseFloat(document.getElementById('produto-preco-custo').value);
            const precoVenda = parseFloat(document.getElementById('produto-preco-venda').value);
            const localizacao = document.getElementById('produto-localizacao').value.trim();
            const validade = document.getElementById('produto-validade').value;
            
            if (!codigo || !nome || !categoria || !fornecedor || !estoqueAtual || !estoqueMinimo || !precoCusto || !precoVenda || !localizacao) {
                alert('Preencha todos os campos obrigatórios!');
                return false;
            }

            // Verificar se código já existe
            if (produtos.find(p => p.codigo === codigo)) {
                alert('Código já existe! Use um código diferente.');
                return false;
            }
            
            const produto = {
                codigo: codigo,
                nome: nome,
                categoria: categoria,
                fornecedor: fornecedor,
                estoqueAtual: estoqueAtual,
                estoqueMinimo: estoqueMinimo,
                precoCusto: precoCusto,
                precoVenda: precoVenda,
                localizacao: localizacao,
                validade: validade || null,
                dataCadastro: new Date().toLocaleString('pt-BR')
            };
            
            produtos.push(produto);
            salvarDados();
            
            alert('Produto cadastrado no estoque com sucesso!');
            
            // Limpar campos
            document.getElementById('produto-codigo').value = '';
            document.getElementById('produto-nome').value = '';
            document.getElementById('produto-categoria').value = '';
            document.getElementById('produto-fornecedor').value = '';
            document.getElementById('produto-estoque-atual').value = '';
            document.getElementById('produto-estoque-minimo').value = '';
            document.getElementById('produto-preco-custo').value = '';
            document.getElementById('produto-preco-venda').value = '';
            document.getElementById('produto-localizacao').value = '';
            document.getElementById('produto-validade').value = '';
            
            return false;
        }

        function atualizarDashboard() {
            const totalProdutos = produtos.length;
            const estoqueBaixo = produtos.filter(p => p.estoqueAtual <= p.estoqueMinimo).length;
            const produtosCriticos = produtos.filter(p => p.estoqueAtual < p.estoqueMinimo).length;
            const valorTotal = produtos.reduce((total, p) => total + (p.precoVenda * p.estoqueAtual), 0);

            document.getElementById('total-produtos').textContent = totalProdutos;
            document.getElementById('estoque-baixo').textContent = estoqueBaixo;
            document.getElementById('produtos-criticos').textContent = produtosCriticos;
            document.getElementById('valor-total').textContent = `R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        function atualizarListaEstoque() {
            const lista = document.getElementById('estoque-list');
            lista.innerHTML = '';
            
            produtos.forEach((produto, index) => {
                const item = document.createElement('div');
                let classe = 'estoque-item';
                
                if (produto.estoqueAtual < produto.estoqueMinimo) {
                    classe += ' critico';
                } else if (produto.estoqueAtual <= produto.estoqueMinimo) {
                    classe += ' baixo';
                }
                
                item.className = classe;
                item.innerHTML = `
                    <strong>${produto.codigo} - ${produto.nome}</strong><br>
                    <strong>Categoria:</strong> ${produto.categoria} | <strong>Fornecedor:</strong> ${produto.fornecedor}<br>
                    <strong>Estoque:</strong> ${produto.estoqueAtual} unidades (Mín: ${produto.estoqueMinimo})<br>
                    <strong>Preços:</strong> Custo: R$ ${produto.precoCusto.toFixed(2)} | Venda: R$ ${produto.precoVenda.toFixed(2)}<br>
                    <strong>Localização:</strong> ${produto.localizacao}
                    ${produto.validade ? `| <strong>Validade:</strong> ${new Date(produto.validade).toLocaleDateString('pt-BR')}` : ''}
                    <br><small>Cadastrado em: ${produto.dataCadastro}</small>
                `;
                lista.appendChild(item);
            });
        }

        function logout() {
            if (confirm('Deseja realmente fazer logout?')) {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
